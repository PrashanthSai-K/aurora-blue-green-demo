name: "BG-Only | 3. Replication & Rollback"

# Four actions:
#   enable-replication          — sets up binlog replication new prod → old blue
#   rollback                    — pre-flight lag check + name-swap rollback via terraform
#   delete-cluster-after-rollback — deletes the <orig>-new1 cluster after rollback
#   delete-old-cluster          — deletes the old blue cluster (happy path, no rollback)

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'enable-replication'
        type: choice
        options:
          - enable-replication
          - rollback
          - delete-cluster-after-rollback
          - delete-old-cluster
      source_cluster_arn:
        description: 'ARN of the source Aurora cluster (same value used throughout)'
        required: true
      target_parameter_group_name:
        description: 'DB cluster parameter group (same value used throughout)'
        required: true
      deployment_name:
        description: 'Same deployment_name used in bgonly-01'
        required: true
        default: 'aurora-bg'
      aurora_cluster_name:
        description: 'Original cluster identifier — used by scripts and for -old1/-new1 naming'
        required: true
      db_secret_arn:
        description: 'Secrets Manager ARN holding DB master credentials (used by MySQL scripts)'
        required: true
      bastion_instance_id:
        description: 'EC2 bastion instance ID for SSM MySQL access'
        required: true
      green_engine_version:
        description: 'Same green_engine_version used in bgonly-01 (blank = same as source)'
        required: false
        default: ''
      tf_state_key:
        description: 'S3 state key — same as bgonly-01'
        required: false
        default: 'aurora-bg/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

jobs:
  plan:
    name: "Plan / Pre-flight (${{ inputs.action }})"
    runs-on: ubuntu-latest
    outputs:
      bastion_id:         ${{ steps.state.outputs.bastion_id }}
      db_secret_arn:      ${{ steps.state.outputs.db_secret_arn }}
      old_cluster_id:     ${{ steps.state.outputs.old_cluster_id }}
      rollback_source:    ${{ steps.state.outputs.rollback_source }}
      rollback_completed: ${{ steps.state.outputs.rollback_completed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}

      - name: Read state
        id: state
        run: |
          OLD_ID=$(terraform output -raw old_blue_cluster_id 2>/dev/null || echo "")
          ROLLBACK_SOURCE=$(terraform output -raw rollback_source_cluster_id 2>/dev/null || echo "")
          ROLLBACK_DONE=$(terraform output -raw rollback_completed 2>/dev/null || echo "false")
          echo "old_cluster_id=$OLD_ID"                         >> $GITHUB_OUTPUT
          echo "rollback_source=$ROLLBACK_SOURCE"               >> $GITHUB_OUTPUT
          echo "rollback_completed=$ROLLBACK_DONE"              >> $GITHUB_OUTPUT
          echo "bastion_id=${{ inputs.bastion_instance_id }}"   >> $GITHUB_OUTPUT
          echo "db_secret_arn=${{ inputs.db_secret_arn }}"      >> $GITHUB_OUTPUT
          echo "Old cluster        : ${OLD_ID:-<none>}"
          echo "Rollback source    : ${ROLLBACK_SOURCE:-<none — fresh run>}"
          echo "Rollback completed : $ROLLBACK_DONE"

      # ── enable-replication ────────────────────────────────────────────────
      - name: Enable replication — new prod → old blue
        if: inputs.action == 'enable-replication'
        run: bash scripts/enable_replication.sh
        env:
          PROXY_ACTIVE:        new
          OLD_CLUSTER_ID:      ${{ steps.state.outputs.old_cluster_id }}
          NEW_CLUSTER_ID:      ${{ inputs.aurora_cluster_name }}
          AWS_REGION:          ${{ inputs.aws_region }}
          DB_SECRET_NAME:      ${{ steps.state.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID: ${{ steps.state.outputs.bastion_id }}

      - name: Replication summary
        if: inputs.action == 'enable-replication'
        run: |
          {
            echo "## Replication Enabled — new prod → old blue"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| New prod (source) | \`${{ inputs.aurora_cluster_name }}\` |"
            echo "| Old blue (replica) | \`${{ steps.state.outputs.old_cluster_id }}\` |"
          } >> $GITHUB_STEP_SUMMARY

      # ── rollback pre-flight ───────────────────────────────────────────────
      - name: Rollback pre-flight — set new prod read-only, wait for lag = 0
        if: inputs.action == 'rollback' && steps.state.outputs.rollback_source == '' && steps.state.outputs.rollback_completed != 'true'
        run: bash scripts/pre_proxy_flip.sh
        env:
          PROXY_ACTIVE:        old
          OLD_CLUSTER_ID:      ${{ inputs.aurora_cluster_name }}-old1
          NEW_CLUSTER_ID:      ${{ inputs.aurora_cluster_name }}
          AWS_REGION:          ${{ inputs.aws_region }}
          DB_SECRET_NAME:      ${{ steps.state.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID: ${{ steps.state.outputs.bastion_id }}

      - name: Pre-flight skipped — partial rollback in progress
        if: inputs.action == 'rollback' && steps.state.outputs.rollback_source != ''
        run: |
          echo "[bgonly-03] rollback_source_cluster_id = ${{ steps.state.outputs.rollback_source }}"
          echo "[bgonly-03] Step 1 already completed on a prior run — skipping pre-flight."

      - name: Pre-flight skipped — rollback already completed
        if: inputs.action == 'rollback' && steps.state.outputs.rollback_completed == 'true'
        run: |
          echo "[bgonly-03] rollback_completed = true — rename already done, only post-swap needed."
          echo "[bgonly-03] Skipping pre-flight."

      - name: Terraform plan — rollback
        if: inputs.action == 'rollback'
        run: |
          terraform plan \
            -var="source_cluster_arn=${{ inputs.source_cluster_arn }}" \
            -var="target_parameter_group_name=${{ inputs.target_parameter_group_name }}" \
            -var="deployment_name=${{ inputs.deployment_name }}" \
            -var="green_engine_version=${{ inputs.green_engine_version }}" \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="trigger_rollback=true" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt

      # ── delete-cluster-after-rollback plan ───────────────────────────────
      - name: Terraform plan — delete -new1 cluster after rollback
        if: inputs.action == 'delete-cluster-after-rollback'
        run: |
          terraform plan \
            -var="source_cluster_arn=${{ inputs.source_cluster_arn }}" \
            -var="target_parameter_group_name=${{ inputs.target_parameter_group_name }}" \
            -var="deployment_name=${{ inputs.deployment_name }}" \
            -var="green_engine_version=${{ inputs.green_engine_version }}" \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="trigger_rollback=true" \
            -var="delete_cluster_after_rollback=true" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt

      - name: Plan summary
        if: inputs.action == 'rollback' || inputs.action == 'delete-cluster-after-rollback'
        run: |
          {
            echo "## Plan — ${{ inputs.action }}"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
            echo "> Approve the **apply** job below to execute."
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        if: inputs.action == 'rollback' || inputs.action == 'delete-cluster-after-rollback'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-bgonly-${{ inputs.action }}
          path: tfplan
          retention-days: 1

      # ── delete-old-cluster (happy path, AWS CLI, no approval) ────────────
      - name: Delete old blue cluster (happy path)
        if: inputs.action == 'delete-old-cluster'
        run: |
          OLD_ID="${{ steps.state.outputs.old_cluster_id }}"
          if [ -z "$OLD_ID" ] || [ "$OLD_ID" = "null" ]; then
            echo "ERROR: old_blue_cluster_id not in state — run bgonly-02-switchover first."
            exit 1
          fi
          echo "Deleting old blue cluster: $OLD_ID"
          aws rds describe-db-instances \
            --filters "Name=db-cluster-id,Values=$OLD_ID" \
            --region "${{ inputs.aws_region }}" \
            --query 'DBInstances[*].DBInstanceIdentifier' \
            --output text | tr '\t' '\n' | while read -r inst; do
            [ -z "$inst" ] && continue
            echo "Deleting instance: $inst"
            aws rds delete-db-instance \
              --db-instance-identifier "$inst" \
              --skip-final-snapshot \
              --region "${{ inputs.aws_region }}" || true
          done
          aws rds wait db-instance-deleted \
            --filters "Name=db-cluster-id,Values=$OLD_ID" \
            --region "${{ inputs.aws_region }}" 2>/dev/null || true
          aws rds delete-db-cluster \
            --db-cluster-identifier "$OLD_ID" \
            --skip-final-snapshot \
            --region "${{ inputs.aws_region }}"
          echo "Old cluster $OLD_ID deleted."

  # ── Apply job (rollback / delete-cluster-after-rollback) ─────────────────
  apply:
    name: "Apply — ${{ inputs.action }}"
    needs: plan
    if: inputs.action == 'rollback' || inputs.action == 'delete-cluster-after-rollback'
    runs-on: ubuntu-latest
    environment: aurora-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-bgonly-${{ inputs.action }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan

      - name: Post-swap — promote restored cluster to read-write
        if: inputs.action == 'rollback'
        run: bash scripts/post_proxy_flip.sh
        env:
          PROXY_ACTIVE:        old
          OLD_CLUSTER_ID:      ${{ inputs.aurora_cluster_name }}
          NEW_CLUSTER_ID:      ${{ inputs.aurora_cluster_name }}-new1
          AWS_REGION:          ${{ inputs.aws_region }}
          DB_SECRET_NAME:      ${{ needs.plan.outputs.db_secret_arn }}
          BASTION_INSTANCE_ID: ${{ needs.plan.outputs.bastion_id }}

      - name: Summary
        run: |
          if [ "${{ inputs.action }}" = "rollback" ]; then
            {
              echo "## Rollback Complete — Original Endpoint Restored"
              echo "| Item | Value |"
              echo "|------|-------|"
              echo "| Restored cluster | \`${{ inputs.aurora_cluster_name }}\` |"
              echo "| Pending delete | \`${{ inputs.aurora_cluster_name }}-new1\` |"
              echo ""
              echo "Run **delete-cluster-after-rollback** to clean up the -new1 cluster."
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "## -new1 Cluster Deleted"
              echo "Rollback cleanup complete."
            } >> $GITHUB_STEP_SUMMARY
          fi
