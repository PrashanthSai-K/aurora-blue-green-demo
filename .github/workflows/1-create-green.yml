name: "BG-Only | 1. Create Green"

# Standalone B/G workflow — manages ONLY the aurora-bluegreen provider resource.
# The Aurora cluster is managed externally (different repo/state).
# Pass source_cluster_arn of the existing cluster to start the B/G lifecycle.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'plan = preview only | apply = create green cluster'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply]
      source_cluster_arn:
        description: 'ARN of the existing Aurora cluster (stays fixed for entire lifecycle)'
        required: true
      target_parameter_group_name:
        description: 'DB cluster parameter group for green (use same as source if unchanged)'
        required: true
      deployment_name:
        description: 'Name prefix for the B/G deployment object (e.g. myapp-bg)'
        required: true
        default: 'aurora-bg'
      green_engine_version:
        description: 'Engine version for green (blank = same as source)'
        required: false
        default: ''
      tf_state_key:
        description: 'S3 state key — unique per cluster (e.g. prod-bg/terraform.tfstate)'
        required: false
        default: 'aurora-bg/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"

jobs:
  plan:
    name: "Plan — Create Green"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="source_cluster_arn=${{ inputs.source_cluster_arn }}" \
            -var="target_parameter_group_name=${{ inputs.target_parameter_group_name }}" \
            -var="deployment_name=${{ inputs.deployment_name }}" \
            -var="green_engine_version=${{ inputs.green_engine_version }}" \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=false" \
            -var="trigger_rollback=false" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt

      - name: Plan Summary
        run: |
          {
            echo "## Plan — Create Green"
            echo "**Cluster ARN:** \`${{ inputs.source_cluster_arn }}\`"
            echo "**State:** \`${{ inputs.tf_state_key }}\`"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

  apply:
    name: "Apply — Create Green"
    needs: plan
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: aurora-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}

      - name: Reset previous cycle state (safety net — normally a no-op)
        # bgonly-03-manage clears state after delete-old-cluster / delete-cluster-after-rollback,
        # so this step is usually a no-op. It guards against cases where state cleanup was
        # skipped (manual intervention, failed workflow) — sets count=0, Delete() in AWS is
        # a no-op since the deployment object is already gone.
        run: |
          terraform apply -auto-approve \
            -var="source_cluster_arn=${{ inputs.source_cluster_arn }}" \
            -var="target_parameter_group_name=${{ inputs.target_parameter_group_name }}" \
            -var="deployment_name=${{ inputs.deployment_name }}" \
            -var="green_engine_version=${{ inputs.green_engine_version }}" \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="enable_blue_green=false"

      - name: Terraform Apply — Create Green
        run: |
          terraform apply -auto-approve \
            -var="source_cluster_arn=${{ inputs.source_cluster_arn }}" \
            -var="target_parameter_group_name=${{ inputs.target_parameter_group_name }}" \
            -var="deployment_name=${{ inputs.deployment_name }}" \
            -var="green_engine_version=${{ inputs.green_engine_version }}" \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=false" \
            -var="trigger_rollback=false"

      - name: Output Summary
        run: |
          BG_ID=$(terraform output -raw blue_green_deployment_id 2>/dev/null || echo "N/A")
          STATUS=$(terraform output -raw blue_green_status 2>/dev/null || echo "N/A")
          GREEN_ARN=$(terraform output -raw green_cluster_arn 2>/dev/null || echo "")
          GREEN_EP="N/A"
          if [ -n "$GREEN_ARN" ] && [ "$GREEN_ARN" != "N/A" ]; then
            TARGET_CLUSTER=$(basename "$GREEN_ARN")
            GREEN_EP=$(aws rds describe-db-clusters \
              --db-cluster-identifier "$TARGET_CLUSTER" \
              --region "${{ inputs.aws_region }}" \
              --query "DBClusters[0].Endpoint" \
              --output text 2>/dev/null || echo "N/A")
          fi
          {
            echo "## Green Cluster Created"
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Deployment ID | \`$BG_ID\` |"
            echo "| Status | \`$STATUS\` |"
            echo "| Green Endpoint | \`$GREEN_EP\` |"
            echo ""
            echo "### Next Steps"
            echo "1. Validate your app against the green endpoint"
            echo "2. Run **bgonly-02-switchover** when ready"
          } >> $GITHUB_STEP_SUMMARY
