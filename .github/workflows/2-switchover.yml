name: "BG-Only | 2. Switchover"

# Triggers the B/G switchover — green becomes production.
# The old blue cluster is retained for rollback.

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'plan = preview only | apply = trigger switchover'
        required: true
        default: 'plan'
        type: choice
        options: [plan, apply]
      source_cluster_arn:
        description: 'ARN of the source Aurora cluster (same value used in bgonly-01)'
        required: true
      target_parameter_group_name:
        description: 'DB cluster parameter group for green (same value used in bgonly-01)'
        required: true
      deployment_name:
        description: 'Same deployment_name used in bgonly-01'
        required: true
        default: 'aurora-bg'
      green_engine_version:
        description: 'Same green_engine_version used in bgonly-01 (blank = same as source)'
        required: false
        default: ''
      aurora_cluster_name:
        description: 'Original cluster name (identifier, not ARN) — used for pre/post flip scripts'
        required: true
      tf_state_key:
        description: 'S3 state key — same as bgonly-01'
        required: false
        default: 'aurora-bg/terraform.tfstate'
      aws_region:
        description: 'AWS Region'
        required: false
        default: 'us-east-1'

env:
  TF_VERSION: "1.9.0"
  GO_VERSION: "1.21"
  PROVIDER_VERSION: "1.0.0"
  TF_DIR: "bluegreen-standalone"

jobs:
  plan:
    name: "Plan — Switchover"
    runs-on: ubuntu-latest
    outputs:
      bastion_id:    ${{ steps.state.outputs.bastion_id }}
      db_secret_arn: ${{ steps.state.outputs.db_secret_arn }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}
          working_directory:     ${{ env.TF_DIR }}

      - name: Read bastion + secret from secrets manager
        id: state
        run: |
          # Bastion instance ID — passed as a repo/env secret or looked up via tags
          BASTION="${{ secrets.BASTION_INSTANCE_ID }}"
          DB_SECRET="${{ secrets.DB_SECRET_ARN }}"
          echo "bastion_id=$BASTION"    >> $GITHUB_OUTPUT
          echo "db_secret_arn=$DB_SECRET" >> $GITHUB_OUTPUT

      - name: Terraform Plan — Switchover
        run: |
          terraform -chdir="${{ env.TF_DIR }}" plan \
            -var="source_cluster_arn=${{ inputs.source_cluster_arn }}" \
            -var="target_parameter_group_name=${{ inputs.target_parameter_group_name }}" \
            -var="deployment_name=${{ inputs.deployment_name }}" \
            -var="green_engine_version=${{ inputs.green_engine_version }}" \
            -var="aws_region=${{ inputs.aws_region }}" \
            -var="enable_blue_green=true" \
            -var="trigger_switchover=true" \
            -var="trigger_rollback=false" \
            -out=tfplan \
            2>&1 | tee /tmp/plan-output.txt

      - name: Plan Summary
        run: |
          {
            echo "## Plan — Switchover"
            echo "**Cluster ARN:** \`${{ inputs.source_cluster_arn }}\`"
            echo '```'
            tail -30 /tmp/plan-output.txt
            echo '```'
            echo "> Approve the **apply** job below to trigger switchover."
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload plan artifact
        if: inputs.action == 'apply'
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-bgonly-switchover
          path: ${{ env.TF_DIR }}/tfplan
          retention-days: 1

  apply:
    name: "Apply — Switchover"
    needs: plan
    if: inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: aurora-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup (provider build + terraform init)
        uses: ./.github/actions/tf-setup
        with:
          aws_access_key_id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws_session_token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws_region:            ${{ inputs.aws_region }}
          tf_state_bucket:       ${{ secrets.TF_STATE_BUCKET }}
          tf_state_key:          ${{ inputs.tf_state_key }}
          tf_state_lock_table:   ${{ secrets.TF_STATE_LOCK_TABLE }}
          tf_version:            ${{ env.TF_VERSION }}
          go_version:            ${{ env.GO_VERSION }}
          provider_version:      ${{ env.PROVIDER_VERSION }}
          working_directory:     ${{ env.TF_DIR }}

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-bgonly-switchover
          path: ${{ env.TF_DIR }}

      - name: Terraform Apply — Switchover
        run: terraform -chdir="${{ env.TF_DIR }}" apply -auto-approve tfplan

      - name: Output Summary
        run: |
          OLD_ID=$(terraform -chdir="${{ env.TF_DIR }}" output -raw old_blue_cluster_id 2>/dev/null || echo "N/A")
          {
            echo "## Switchover Complete"
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| New production cluster | \`${{ inputs.aurora_cluster_name }}\` |"
            echo "| Old blue cluster (retained) | \`$OLD_ID\` |"
            echo ""
            echo "### Next Steps"
            echo "- Run **bgonly-03-manage** → enable-replication for zero-lag rollback safety"
            echo "- Or run **bgonly-03-manage** → delete-old-cluster if no rollback needed"
          } >> $GITHUB_STEP_SUMMARY
